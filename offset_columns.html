<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offsetting Columns</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .row { background-color: #f8f9fa; margin-bottom: 20px; padding: 10px; border: 1px dashed #ccc; }
        .col-md-4, .col-md-3, .col-md-6 { background-color: #0d6efd; color: white; padding: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container py-4">
        <h4 class="mb-4">Offsetting Columns</h4>

        <div class="row">
            <div class="col-md-4">.col-md-4</div>
            <div class="col-md-4 offset-md-4">.col-md-4 .offset-md-4</div>
        </div>

        <div class="row">
            <div class="col-md-3 offset-md-3">.col-md-3 .offset-md-3</div>
            <div class="col-md-3 offset-md-3">.col-md-3 .offset-md-3</div>
        </div>

        <div class="row">
            <div class="col-md-6 offset-md-3">.col-md-6 .offset-md-3</div>
        </div>
    </div>

</body>
</html>
