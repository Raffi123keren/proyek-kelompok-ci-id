<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vertical Alignment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .row { min-height: 150px; background-color: #f8f9fa; margin-bottom: 20px; border: 1px dashed #ccc; }
        .col { background-color: #0d6efd; color: white; padding: 15px; border: 1px solid white; text-align: center; }
    </style>
</head>
<body>

    <div class="container py-4">
        <h4 class="mb-3">Vertical Alignment</h4>

        <div class="row align-items-start">
            <div class="col">align-items-start</div>
            <div class="col">align-items-start</div>
            <div class="col">align-items-start</div>
        </div>

        <div class="row align-items-center">
            <div class="col">align-items-center</div>
            <div class="col">align-items-center</div>
            <div class="col">align-items-center</div>
        </div>

        <div class="row align-items-end">
            <div class="col">align-items-end</div>
            <div class="col">align-items-end</div>
            <div class="col">align-items-end</div>
        </div>
    </div>

</body>
</html>
