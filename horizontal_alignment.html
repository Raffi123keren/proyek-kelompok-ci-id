<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizontal Alignment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .row { background-color: #f8f9fa; margin-bottom: 15px; padding: 10px; border: 1px dashed #ccc; }
        .col-4 { background-color: #5c636a; color: white; padding: 10px; border: 1px solid white; text-align: center; }
    </style>
</head>
<body>

    <div class="container py-4">
        <h4 class="mb-3">Horizontal Alignment</h4>

        <div class="row justify-content-start">
            <div class="col-4">justify-content-start</div>
            <div class="col-4">justify-content-start</div>
        </div>

        <div class="row justify-content-center">
            <div class="col-4">justify-content-center</div>
            <div class="col-4">justify-content-center</div>
        </div>

        <div class="row justify-content-end">
            <div class="col-4">justify-content-end</div>
            <div class="col-4">justify-content-end</div>
        </div>

        <div class="row justify-content-around">
            <div class="col-4">justify-content-around</div>
            <div class="col-4">justify-content-around</div>
        </div>

        <div class="row justify-content-between">
            <div class="col-4">justify-content-between</div>
            <div class="col-4">justify-content-between</div>
        </div>
    </div>

</body>
</html>
