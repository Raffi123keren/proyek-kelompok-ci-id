<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 3 - Responsive Two-Column</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container py-3">
        <div class="row g-3">
            <div class="col-md-8">
                <div class="bg-primary text-white p-4 rounded" style="min-height: 120px;">
                    <h5>Main article</h5>
                    <p class="mb-0 text-white-50">col-md-8</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="bg-secondary text-white p-4 rounded" style="min-height: 120px;">
                    <h5>Sidebar</h5>
                    <p class="mb-0 text-white-50">col-md-4</p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
