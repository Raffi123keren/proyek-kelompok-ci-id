<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reordering Columns</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .col { color: white; padding: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container py-4">
        <h4 class="mb-3">Reordering Columns</h4>
        
        <div class="row g-2">
            <div class="col order-3 bg-danger">
                First in DOM, but third visually
            </div>
            
            <div class="col order-1 bg-primary">
                Second in DOM, but first visually
            </div>
            
            <div class="col order-2 bg-success">
                Third in DOM, but second visually
            </div>
        </div>

        <h4 class="mt-4 mb-3">Using First and Last Class</h4>
        <div class="row g-2">
            <div class="col order-last bg-warning text-dark">
                First in DOM, but Last visually
            </div>
            <div class="col bg-secondary">
                Second in DOM, stays stacked
            </div>
            <div class="col order-first bg-info text-dark">
                Third in DOM, but First visually
            </div>
        </div>
    </div>

</body>
</html>
